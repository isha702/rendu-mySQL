<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Harry Potter</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <header>
        <div class="logo">HARRY POTTER !</div>
        <nav>
            <button onclick="window.location.href='index.html'">Accueil</button>
            <button onclick="window.location.href='connexion.html'">Connexion</button>
            <button onclick="window.location.href='inscription.html'">Inscription</button>
        </nav>
    </header>

    <section class="hero">
        <h1>Créer un compte</h1>
    </section>

    <div class="form-container">
        <form id="inscriptionForm" novalidate>

            <div class="field-group">
                <label for="pseudo">Pseudo</label>
                <input type="text" id="pseudo" placeholder="Votre pseudo (6 caractères min.)">
                <span class="field-msg" id="pseudoMsg"></span>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="votremail@exemple.com">
                <span class="field-msg" id="emailMsg"></span>
            </div>

            <div class="field-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="8 caractères minimum">
                <span class="field-msg" id="passwordMsg"></span>
            </div>

            <div class="field-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="Répétez votre mot de passe">
                <span class="field-msg" id="confirmPasswordMsg"></span>
            </div>

            <div class="field-group">
                <label class="qcm-label">Quelle est votre maison de Poudlard ?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="maison" value="gryffondor">
                        <span class="radio-custom"></span>
                        Gryffondor
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="maison" value="serpentard">
                        <span class="radio-custom"></span>
                        Serpentard
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="maison" value="poufsouffle">
                        <span class="radio-custom"></span>
                        Poufsouffle
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="maison" value="serdaigle">
                        <span class="radio-custom"></span>
                        Serdaigle
                    </label>
                </div>
                <span class="field-msg" id="maisonMsg"></span>
            </div>

            <div class="field-group">
                <label class="qcm-label">Vos centres d'intérêt dans l'univers HP (au moins 1) :</label>
                <div class="checkbox-group">
                    <label class="checkbox-option">
                        <input type="checkbox" name="interets" value="sorts">
                        <span class="checkbox-custom"></span>
                        Sorts & Magie
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="interets" value="creatures">
                        <span class="checkbox-custom"></span>
                        Créatures Magiques
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="interets" value="potions">
                        <span class="checkbox-custom"></span>
                        Potions
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="interets" value="quidditch">
                        <span class="checkbox-custom"></span>
                        Quidditch
                    </label>
                </div>
                <span class="field-msg" id="interetsMsg"></span>
            </div>

            <button type="submit" class="submit-btn">S'inscrire</button>

            <div id="formMsg" class="form-msg" style="display:none;"></div>

        </form>
    </div>

    <footer>© 2026 Magic Cards</footer>

    <script src="inscription.js"></script>

</body>

</html>
